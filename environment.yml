# =============================================================================
# fashion-retrieval-agent conda environment
# =============================================================================
# Mirrors speechQwen2VL/environment.yml so the conda layer (Python +
# cuda-toolkit + audio system libs) is identical. Pip layer is in
# requirements.txt and is a superset of speechQwen2VL's pip deps.
#
# To create this environment (Linux server with NVIDIA GPU):
#   conda env create -f environment.yml
#   conda activate fashion_retrieval
#   pip install -r requirements.txt
#   bash ../speechQwen2VL/scripts/setup_forks.sh   # install forks LAST
#
# Or just run scripts/setup_server.sh which does all of the above.
# =============================================================================

name: fashion_retrieval
channels:
  - conda-forge
  - defaults
  - nvidia
dependencies:
  - python=3.10.18
  - cuda-toolkit=12.1.1
  # Audio system libraries (inherited from speechQwen2VL — not used by the
  # Stage-2 baseline today but kept so the env can run Stage-1 audio code
  # without a second install pass).
  - ffmpeg=8.0.1
  - libsndfile=1.2.2
  - pip:
      - -r requirements.txt
